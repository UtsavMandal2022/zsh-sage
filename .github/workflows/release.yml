name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (without v prefix, e.g. 0.3.0)'
        required: true
        type: string
      notes:
        description: 'Release notes'
        required: false
        type: string
        default: ''

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version in cli.zsh
        run: |
          sed -i 's|^typeset -g _SAGE_VERSION=".*"|typeset -g _SAGE_VERSION="${{ inputs.version }}"|' src/core/cli.zsh
          grep _SAGE_VERSION src/core/cli.zsh

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/core/cli.zsh
          git commit -m "Bump version to v${{ inputs.version }}"
          git push

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NOTES="${{ inputs.notes }}"
          if [ -z "$NOTES" ]; then
            NOTES="Release v${{ inputs.version }}"
          fi
          gh release create "v${{ inputs.version }}" \
            --title "v${{ inputs.version }}" \
            --notes "$NOTES" \
            --target main
